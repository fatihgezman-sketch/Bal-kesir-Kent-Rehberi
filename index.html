<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GZMN - Balıkesir Kent Rehberi</title>
<style>
  :root{
    --bg:#000000;
    --panel:#0f0f0f;
    --border:#3a3a3a;
    --border-dim:#2a2a2a;
    --text:#e8e8e8;
    --text-dim:#8a8a8a;
    --accent:#4CAF50;
    --accent-dark:#3d9140;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:20px 16px 60px;
  }
  header{
    text-align:center;
    margin-bottom:24px;
  }
  header .logo{
    font-size:30px;
    font-weight:800;
    letter-spacing:1px;
    color:var(--text);
  }
  header .sub{
    font-size:13px;
    font-weight:300;
    color:var(--text-dim);
    margin-top:2px;
    letter-spacing:.4px;
  }
  .field{
    position:relative;
    margin-bottom:16px;
  }
  select, input.combo-input{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    background:var(--panel);
    color:var(--text);
    border:1.5px solid var(--border);
    border-radius:8px;
    padding:16px 40px 16px 16px;
    font-size:16px;
    font-family:inherit;
  }
  select:disabled, input.combo-input:disabled{
    color:var(--text-dim);
    opacity:.5;
  }
  select:not(:disabled), input.combo-input:not(:disabled){
    border-color:#555;
  }
  .field.select-field::after{
    content:"";
    position:absolute;
    right:16px;
    top:50%;
    width:10px;
    height:10px;
    border-right:2px solid var(--text-dim);
    border-bottom:2px solid var(--text-dim);
    transform:translateY(-70%) rotate(45deg);
    pointer-events:none;
  }
  .combo-clear{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    width:22px;
    height:22px;
    border-radius:50%;
    background:var(--border);
    color:var(--text-dim);
    font-size:14px;
    display:none;
    align-items:center;
    justify-content:center;
    line-height:1;
  }
  .combo-clear.show{ display:flex; }
  .combo-list{
    position:absolute;
    left:0; right:0; top:calc(100% + 4px);
    background:#141414;
    border:1.5px solid #555;
    border-radius:8px;
    max-height:260px;
    overflow-y:auto;
    z-index:20;
    display:none;
    box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  .combo-list.show{ display:block; }
  .combo-item{
    padding:13px 16px;
    font-size:15px;
    border-bottom:1px solid var(--border-dim);
  }
  .combo-item:last-child{ border-bottom:none; }
  .combo-item:active{ background:#222; }
  .combo-item .sub{ color:var(--text-dim); font-size:12.5px; margin-top:1px; }
  .combo-empty{
    padding:14px 16px;
    color:var(--text-dim);
    font-size:14px;
  }
  button#sorgula{
    width:100%;
    padding:17px;
    margin-top:6px;
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    font-weight:600;
    letter-spacing:.3px;
  }
  button#sorgula:active{ background:var(--accent-dark); }
  button#sorgula:disabled{
    background:#2c3e2d;
    color:#6b8c6d;
  }
  .hint{
    text-align:center;
    color:var(--text-dim);
    font-size:12.5px;
    margin-top:14px;
    line-height:1.5;
  }
  .result{
    margin-top:18px;
    padding:14px 16px;
    background:var(--panel);
    border:1px solid var(--border-dim);
    border-radius:8px;
    font-size:14px;
    color:var(--text-dim);
    display:none;
  }
  .result.show{ display:block; }
  .result b{ color:var(--text); }
  a#mapLink{
    display:block;
    text-align:center;
    margin-top:12px;
    padding:15px;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-size:16px;
    font-weight:600;
  }
  a#mapLink:active{ background:var(--accent-dark); }
</style>
</head>
<body>

<header>
  <div class="logo">GZMN</div>
  <div class="sub">Balıkesir Kent Rehberi</div>
</header>

<div class="field select-field">
  <select id="ilce" disabled>
    <option value="">Yükleniyor…</option>
  </select>
</div>

<div class="field">
  <input class="combo-input" id="mahalleInput" placeholder="Mahalle Seçiniz" disabled autocomplete="off" inputmode="search">
  <div class="combo-clear" id="mahalleClear">✕</div>
  <div class="combo-list" id="mahalleList"></div>
</div>

<div class="field">
  <input class="combo-input" id="sokakInput" placeholder="Sokak Seçiniz" disabled autocomplete="off" inputmode="search">
  <div class="combo-clear" id="sokakClear">✕</div>
  <div class="combo-list" id="sokakList"></div>
</div>

<div class="field">
  <input class="combo-input" id="kapinoInput" placeholder="Kapı No Seçiniz (opsiyonel)" disabled autocomplete="off" inputmode="search">
  <div class="combo-clear" id="kapinoClear">✕</div>
  <div class="combo-list" id="kapinoList"></div>
</div>

<button id="sorgula" disabled>Sorgula</button>

<div class="hint">Kapı numarası seçmezseniz o sokaktaki en küçük kapı numarasının konumu açılır. Mahalle / Sokak / Kapı No kutularına yazarak da arama yapabilirsiniz.</div>

<div class="result" id="result"></div>
<a id="mapLink" style="display:none" href="#">📍 Haritada Aç</a>

<script>
/* ============================================================
   VERİ YÜKLEME STRATEJİSİ
   - meta.json: sadece ilçe + mahalle adları (küçük, ilk açılışta yüklenir)
   - data/{mahalleId}.json: o mahalledeki tüm sokak + kapı no verisi
     (mahalle seçilince indirilir, sonra hafızada tutulur)
   Bu sayede 300.000+ satırlık veride bile sayfa hızlı açılır.
   ============================================================ */

let META = null;
let currentMahalleData = null; // {s:[sokak isimleri], a:[[sokakIdx, kapiNo, blok, enlem, boylam], ...]}
let currentSokakRows = [];     // seçili sokağa ait satırlar (a'dan filtrelenmiş)
let selectedMahalleId = null;
let selectedSokakIdx = null;
let selectedKapiRow = null;

const ilceSel = document.getElementById('ilce');
const sorgulaBtn = document.getElementById('sorgula');
const resultBox = document.getElementById('result');
const mapLink = document.getElementById('mapLink');

function trLower(s){ return (s||'').toLocaleLowerCase('tr-TR'); }

/* ---------- Genel amaçlı arattırılabilir combobox ---------- */
function makeCombo({inputEl, listEl, clearEl, getAllItems, renderItem, onSelect, onClear}){
  let items = [];

  function open(){
    if(inputEl.disabled) return;
    render(inputEl.value);
    listEl.classList.add('show');
  }
  function close(){ listEl.classList.remove('show'); }

  function render(query){
    items = getAllItems();
    const q = trLower(query.trim());
    const filtered = q ? items.filter(it => trLower(it.label).includes(q)) : items;
    if(filtered.length === 0){
      listEl.innerHTML = `<div class="combo-empty">Sonuç bulunamadı</div>`;
      return;
    }
    const MAX = 200; // performans için ekranda aşırı uzun liste göstermeyelim
    const shown = filtered.slice(0, MAX);
    listEl.innerHTML = shown.map((it, i) => renderItem(it, i)).join('');
    [...listEl.children].forEach((el, i)=>{
      el.addEventListener('click', ()=>{
        inputEl.value = shown[i].label;
        close();
        clearEl.classList.add('show');
        onSelect(shown[i]);
      });
    });
  }

  inputEl.addEventListener('focus', open);
  inputEl.addEventListener('input', ()=>{
    clearEl.classList.toggle('show', inputEl.value.length>0);
    onClear && onClear(true); // yazmaya başlayınca eski seçim geçersiz sayılır
    render(inputEl.value);
    listEl.classList.add('show');
  });
  clearEl.addEventListener('click', ()=>{
    inputEl.value = '';
    clearEl.classList.remove('show');
    onClear && onClear(false);
    inputEl.focus();
  });
  document.addEventListener('click', (e)=>{
    if(!inputEl.contains(e.target) && !listEl.contains(e.target) && !clearEl.contains(e.target)) close();
  });

  return { close, refresh: ()=>render(inputEl.value) };
}

/* ---------- Alan tanımları ---------- */
const mahalleInput = document.getElementById('mahalleInput');
const mahalleList = document.getElementById('mahalleList');
const mahalleClear = document.getElementById('mahalleClear');

const sokakInput = document.getElementById('sokakInput');
const sokakList = document.getElementById('sokakList');
const sokakClear = document.getElementById('sokakClear');

const kapinoInput = document.getElementById('kapinoInput');
const kapinoList = document.getElementById('kapinoList');
const kapinoClear = document.getElementById('kapinoClear');

function resetSokak(){
  selectedSokakIdx = null;
  sokakInput.value = ''; sokakInput.disabled = true; sokakClear.classList.remove('show');
  resetKapino();
}
function resetKapino(){
  selectedKapiRow = null;
  kapinoInput.value = ''; kapinoInput.disabled = true; kapinoClear.classList.remove('show');
  sorgulaBtn.disabled = true;
  resultBox.classList.remove('show');
  mapLink.style.display = 'none';
}
function resetMahalleDependents(){
  currentMahalleData = null;
  resetSokak();
}

/* ---------- Mahalle combobox ---------- */
const mahalleCombo = makeCombo({
  inputEl: mahalleInput, listEl: mahalleList, clearEl: mahalleClear,
  getAllItems: ()=>{
    const ilceObj = META.ilceler.find(i=>i.ad===ilceSel.value);
    if(!ilceObj) return [];
    return ilceObj.mahalleler.map(m=>({label:m.ad, id:m.id}));
  },
  renderItem: (it)=>`<div class="combo-item">${it.label}</div>`,
  onSelect: async (it)=>{
    selectedMahalleId = it.id;
    resetMahalleDependents();
    sokakInput.placeholder = 'Yükleniyor…';
    sokakInput.disabled = true;
    try{
      const res = await fetch(`data/${it.id}.json`);
      currentMahalleData = await res.json();
      sokakInput.placeholder = 'Sokak Seçiniz';
      sokakInput.disabled = false;
    }catch(err){
      sokakInput.placeholder = 'Veri yüklenemedi';
      console.error(err);
    }
  },
  onClear: (typing)=>{ if(typing){ selectedMahalleId=null; resetMahalleDependents(); } }
});

/* ---------- Sokak combobox ---------- */
const sokakCombo = makeCombo({
  inputEl: sokakInput, listEl: sokakList, clearEl: sokakClear,
  getAllItems: ()=>{
    if(!currentMahalleData) return [];
    return currentMahalleData.s.map((name, idx)=>({label:name, idx}));
  },
  renderItem: (it)=>`<div class="combo-item">${it.label}</div>`,
  onSelect: (it)=>{
    selectedSokakIdx = it.idx;
    resetKapino();
    currentSokakRows = currentMahalleData.a.filter(row => row[0] === it.idx);
    kapinoInput.disabled = false;
    kapinoInput.placeholder = 'Kapı No Seçiniz (opsiyonel)';
    sorgulaBtn.disabled = false;
  },
  onClear: (typing)=>{ if(typing){ selectedSokakIdx=null; resetKapino(); } }
});

/* ---------- Kapı No combobox ---------- */
const kapinoCombo = makeCombo({
  inputEl: kapinoInput, listEl: kapinoList, clearEl: kapinoClear,
  getAllItems: ()=>{
    return currentSokakRows
      .map((row, i)=>({
        label: row[2] ? `${row[1]} - ${row[2]} Blok` : `${row[1]}`,
        rowIndex: i,
        kapiNo: row[1]
      }))
      .sort((a,b)=> a.kapiNo - b.kapiNo || a.label.localeCompare(b.label,'tr'));
  },
  renderItem: (it)=>`<div class="combo-item">${it.label}</div>`,
  onSelect: (it)=>{
    selectedKapiRow = currentSokakRows[it.rowIndex];
    sorgulaBtn.disabled = false;
  },
  onClear: (typing)=>{ if(typing){ selectedKapiRow=null; } }
});

/* ---------- İlçe ---------- */
ilceSel.addEventListener('change', ()=>{
  mahalleInput.value=''; mahalleClear.classList.remove('show');
  selectedMahalleId = null;
  resetMahalleDependents();
  const has = !!ilceSel.value;
  mahalleInput.disabled = !has;
  mahalleInput.placeholder = has ? 'Mahalle Seçiniz' : 'Önce ilçe seçiniz';
});

/* ---------- Harita linki ---------- */
function isiOS(){
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
         (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function buildMapUrl(lat, lng, label){
  const encodedLabel = encodeURIComponent(label || '');
  if(isiOS()){
    return `https://maps.apple.com/?ll=${lat},${lng}&q=${encodedLabel}`;
  }
  return `geo:${lat},${lng}?q=${lat},${lng}(${encodedLabel})`;
}

/* ---------- Sorgula ---------- */
sorgulaBtn.addEventListener('click', ()=>{
  if(!ilceSel.value || selectedMahalleId===null || selectedSokakIdx===null || currentSokakRows.length===0) return;

  let row;
  if(selectedKapiRow){
    row = selectedKapiRow;
  } else {
    // Kapı no seçilmediyse: sokaktaki en küçük kapı numaralı satır
    row = currentSokakRows.reduce((min, cur)=> cur[1] < min[1] ? cur : min, currentSokakRows[0]);
  }

  const sokakAdi = currentMahalleData.s[selectedSokakIdx];
  const mahalleAdi = mahalleInput.value;
  const [, kapiNo, blok, enlem, boylam] = row;
  const label = `${sokakAdi} No:${kapiNo}${blok ? ' '+blok+' Blok' : ''}, ${mahalleAdi}/${ilceSel.value}`;

  resultBox.innerHTML = `<b>${label}</b><br>${enlem}, ${boylam}`;
  resultBox.classList.add('show');

  mapLink.href = buildMapUrl(enlem, boylam, label);
  mapLink.style.display = 'block';
});

/* ---------- Başlangıç: meta.json yükle ---------- */
async function init(){
  try{
    const res = await fetch('meta.json');
    META = await res.json();
    ilceSel.innerHTML = `<option value="">İlçe Seçiniz</option>` +
      META.ilceler.map(i=>`<option value="${i.ad}">${i.ad}</option>`).join('');
    ilceSel.disabled = false;
  }catch(err){
    ilceSel.innerHTML = `<option value="">Veri yüklenemedi (meta.json bulunamadı)</option>`;
    console.error(err);
  }
}
init();
</script>
</body>
</html>
